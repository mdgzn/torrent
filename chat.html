<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>P2P WebRTC Manual Signaling</title>

<style>
body{
font-family:monospace;
background:#f4f7fb;
padding:20px;
max-width:700px;
margin:auto;
}

textarea,input{
width:100%;
margin:5px 0;
padding:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
margin:5px 0;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

pre{
background:#111;
color:#eee;
padding:10px;
height:200px;
overflow:auto;
}
</style>
</head>

<body>

<h2>🔗 P2P WebRTC Manual Signaling (2 Orang)</h2>

<button onclick="createOffer()">Buat Offer</button>

<textarea id="signalInput" placeholder="Paste signaling dari teman"></textarea>
<button onclick="applySignal()">Apply Signaling</button>

<textarea id="signalOutput" readonly placeholder="Signaling untuk dikirim"></textarea>

<input id="msg" placeholder="Ketik pesan">
<button onclick="sendMsg()">Kirim</button>

<pre id="log"></pre>

<script src="https://cdn.jsdelivr.net/npm/simple-peer@9/simplepeer.min.js"></script>

<script>

let peer=null

const logEl=document.getElementById("log")
const output=document.getElementById("signalOutput")

const myId="user"+Math.floor(Math.random()*9999)

function log(t){
logEl.textContent+=t+"\n"
logEl.scrollTop=logEl.scrollHeight
}

function createPeer(initiator){

peer=new SimplePeer({

initiator:initiator,
trickle:false,

config:{
iceServers:[
{urls:'stun:stun.l.google.com:19302'},
{urls:'stun:stun1.l.google.com:19302'},
{urls:'stun:stun2.l.google.com:19302'},
{urls:'stun:global.stun.twilio.com:3478'}
]
}

})

peer.on("signal",data=>{

const payload={
type:data.type,
signal:data
}

output.value=JSON.stringify(payload,null,2)

log("📡 Signal dibuat: "+data.type)

})

peer.on("connect",()=>{

log("✅ Connected!")

})

peer.on("data",d=>{

try{

const m=JSON.parse(d)

if(m.type==="ping") return

log("💬 "+m.from+" : "+m.text)

}catch{

log("📦 "+d)

}

})

peer.on("close",()=>{

log("⚠️ Connection closed")

})

peer.on("error",e=>{

log("❌ "+e.message)

})

}

function createOffer(){

createPeer(true)

log("⏳ Offer dibuat")

}

function applySignal(){

let obj

try{

obj=JSON.parse(document.getElementById("signalInput").value)

}catch{

alert("JSON tidak valid")

return

}

if(!peer){

createPeer(false)

log("📥 Offer diterima")

}

peer.signal(obj.signal)

log("📡 Signal diterapkan: "+obj.type)

document.getElementById("signalInput").value=""

}

function sendMsg(){

const text=document.getElementById("msg").value

if(!text) return

if(peer && peer.connected){

peer.send(JSON.stringify({

from:myId,
text:text

}))

log("🗨️ Kamu : "+text)

}

document.getElementById("msg").value=""

}

setInterval(()=>{

if(peer && peer.connected){

peer.send(JSON.stringify({type:"ping"}))

}

},20000)

</script>

</body>
</html>
