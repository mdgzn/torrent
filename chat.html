<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>P2P Chat Tanpa Server</title>

<style>
body{
font-family:monospace;
background:#f4f7fb;
padding:20px;
max-width:700px;
margin:auto;
}

textarea,input{
width:100%;
margin:6px 0;
padding:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
margin:6px 0;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

pre{
background:#111;
color:#eee;
padding:10px;
height:200px;
overflow:auto;
}
</style>
</head>

<body>

<h2>💬 P2P Chat Tanpa Server</h2>

<button onclick="buatOffer()">Buat Offer</button>

<textarea id="inputSignal" placeholder="Paste signal dari teman"></textarea>
<button onclick="applySignal()">Apply Signal</button>

<textarea id="outputSignal" readonly placeholder="Signal untuk dikirim"></textarea>

<input id="msg" placeholder="Ketik pesan">
<button onclick="kirim()">Kirim</button>

<pre id="log"></pre>

<script src="https://cdn.jsdelivr.net/npm/simple-peer@9/simplepeer.min.js"></script>

<script>

let peer=null

const logEl=document.getElementById("log")
const out=document.getElementById("outputSignal")

const myId="user"+Math.floor(Math.random()*9999)

function log(t){
logEl.textContent+=t+"\n"
logEl.scrollTop=logEl.scrollHeight
}

function buatPeer(initiator){

peer=new SimplePeer({

initiator:initiator,
trickle:false,

config:{
iceServers:[
{urls:"stun:stun.l.google.com:19302"},
{urls:"stun:stun1.l.google.com:19302"},
{urls:"stun:stun2.l.google.com:19302"},
{urls:"stun:stun3.l.google.com:19302"}
]
}

})

peer.on("signal",data=>{

const payload={
signal:data
}

out.value=JSON.stringify(payload,null,2)

log("📡 Signal dibuat")

})

peer.on("connect",()=>{

log("✅ Connected")

})

peer.on("data",d=>{

try{

const m=JSON.parse(d)

if(m.type==="ping") return

log("💬 "+m.from+" : "+m.text)

}catch{

log("📦 "+d)

}

})

peer.on("close",()=>{

log("⚠️ Connection closed")

})

peer.on("error",e=>{

log("❌ "+e.message)

})

}

function buatOffer(){

buatPeer(true)

log("⏳ Offer dibuat")

}

function applySignal(){

let obj

try{
obj=JSON.parse(document.getElementById("inputSignal").value)
}catch{
alert("JSON tidak valid")
return
}

if(!peer){

buatPeer(false)

log("📥 Offer diterima")

}

peer.signal(obj.signal)

log("📡 Signal diterapkan")

document.getElementById("inputSignal").value=""

}

function kirim(){

const text=document.getElementById("msg").value

if(!text) return

if(peer && peer.connected){

peer.send(JSON.stringify({

from:myId,
text:text

}))

log("🗨️ Kamu : "+text)

}

document.getElementById("msg").value=""

}

setInterval(()=>{

if(peer && peer.connected){

peer.send(JSON.stringify({type:"ping"}))

}

},20000)

</script>

</body>
</html>
