<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Hypercore Demo</title>

<style>
body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

button,input{
padding:8px;
width:100%;
margin-top:6px;
}

#log{
white-space:pre-line;
background:#111;
color:#0f0;
padding:10px;
height:200px;
overflow:auto;
}
</style>

</head>
<body>

<h2>Mini Hypercore Learning Demo</h2>

<div class="card">

<h3>Seeder (Append Data)</h3>

<input id="dataInput" placeholder="Tulis data baru">

<button id="appendBtn">Append Data</button>

</div>

<div class="card">

<h3>Shared Log</h3>

<div id="log"></div>

</div>

<script>

let logData=[]

function render(){

log.innerText=logData
.map((d,i)=>`#${i}  ${d}`)
.join("\n")

}

appendBtn.onclick=()=>{

const data=dataInput.value.trim()

if(!data) return

logData.push(data)

render()

broadcast(data)

dataInput.value=""

}

/* ==== Simulasi broadcast ==== */

const channel=new BroadcastChannel("hypercore-demo")

function broadcast(data){

channel.postMessage(data)

}

channel.onmessage=(e)=>{

logData.push(e.data)

render()

}

</script>

</body>
</html>
