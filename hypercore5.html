<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Hypercore Chat Safe Demo</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>
body{
  font-family: system-ui, sans-serif;
  background: #f4f6f9;
  margin: 0;
}

header{
  background: #111827;
  color: white;
  padding: 20px;
  text-align: center;
}

.container{
  max-width: 900px;
  margin: auto;
  padding: 10px 15px;
}

.card{
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 4px 12px rgba(0,0,0,.06);
}

input, button{
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  font-size: 16px;
}

button{
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
}

#chat{
  background: #0f172a;
  color: white;
  padding: 10px;
  height: 300px;
  overflow-y: auto;
  font-family: monospace;
  border-radius: 6px;
}

@media (max-width: 600px){
  .card{
    padding: 15px;
  }

  input, button{
    font-size: 14px;
    padding: 10px;
  }

  #chat{
    height: 250px;
  }
}
</style>
</head>

<body>

<header>
  <h1>P2P Group Chat Safe Demo</h1>
  <p>Chat P2P tanpa kehilangan history</p>
</header>

<div class="container">

  <div class="card">
    <h3>Identitas</h3>
    <input id="username" placeholder="Nama kamu">
    <p>Public Key:</p>
    <input id="myId" readonly>
    <p>Connect ke Peer:</p>
    <input id="peerId" placeholder="Masukkan Peer ID">
    <button id="connectBtn">Connect</button>
  </div>

  <div class="card">
    <h3>Chat Group</h3>
    <div id="chat"></div>
    <input id="messageInput" placeholder="Tulis pesan...">
    <button id="sendBtn">Kirim</button>
  </div>

</div>

<script>
let chatLog = []      // semua pesan lokal
let connections = []  // semua koneksi aktif

const peer = new Peer()

const chat = document.getElementById("chat")
const username = document.getElementById("username")
const myId = document.getElementById("myId")
const peerId = document.getElementById("peerId")
const connectBtn = document.getElementById("connectBtn")
const sendBtn = document.getElementById("sendBtn")
const messageInput = document.getElementById("messageInput")

function render(){
  chat.innerText = chatLog.map(m => `${m.user}: ${m.text}`).join("\n")
  chat.scrollTop = chat.scrollHeight
}

// Kirim pesan ke semua peer
function broadcast(msg){
  connections.forEach(c => {
    if(c.open) c.send(msg)
  })
}

// Tambahkan pesan baru, hindari duplikat
function addMessage(msg){
  const exists = chatLog.some(m => m.time === msg.time && m.user === msg.user)
  if(!exists){
    chatLog.push(msg)
    chatLog.sort((a,b)=>a.time - b.time) // urutkan berdasarkan waktu
    render()
  }
}

// Kirim pesan baru
sendBtn.onclick = () => {
  const text = messageInput.value.trim()
  if(!text) return

  const msg = {
    user: username.value || "anon",
    text,
    time: Date.now()
  }

  addMessage(msg)
  broadcast({ type: "chat", msg })
  messageInput.value = ""
}

// Set ID peer
peer.on("open", id => {
  myId.value = id
})

// Connect ke peer lain
connectBtn.onclick = () => {
  const conn = peer.connect(peerId.value)
  setupConnection(conn)
}

// Handle koneksi masuk
peer.on("connection", conn => {
  setupConnection(conn)
})

// Setup koneksi baru
function setupConnection(conn){
  connections.push(conn)

  conn.on("open", () => {
    // Kirim semua chat history ke peer baru
    conn.send({ type: "sync", chatLog })
  })

  conn.on("data", data => {
    if(data.type === "chat"){
      addMessage(data.msg)
      // Broadcast pesan ke semua peer kecuali pengirim
      connections.forEach(c => {
        if(c !== conn && c.open) c.send(data)
      })
    }
    if(data.type === "sync"){
      data.chatLog.forEach(msg => addMessage(msg))
    }
  })

  conn.on("close", () => {
    // hapus koneksi jika peer disconnect
    connections = connections.filter(c => c !== conn)
  })
}
</script>

</body>
</html>
