<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Obrolan Seo Mesh</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui;
background:#111b21;
}

.app{
display:flex;
flex-direction:column;
height:100dvh;
max-width:500px;
margin:auto;
background:#0b141a;
color:white;
}

.header{
background:#202c33;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:#25d366;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.groupname{
font-size:16px;
font-weight:600;
}

.status{
font-size:12px;
opacity:.7;
}

.setup{
padding:8px;
background:#111b21;
font-size:12px;
}

.setup input{
width:100%;
padding:8px;
margin-top:5px;
border:none;
border-radius:6px;
}

.setup button{
margin-top:5px;
padding:8px;
border:none;
border-radius:6px;
background:#25d366;
color:white;
}

.chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.msg{
max-width:80%;
padding:8px 10px;
border-radius:8px;
font-size:14px;
word-break:break-word;
}

.me{
background:#005c4b;
align-self:flex-end;
}

.other{
background:#202c33;
align-self:flex-start;
}

.sender{
font-size:12px;
font-weight:600;
color:#25d366;
margin-bottom:2px;
}

.time{
font-size:10px;
opacity:.6;
text-align:right;
margin-top:2px;
}

.footer{
display:flex;
gap:6px;
padding:8px;
background:#202c33;
}

.footer input{
flex:1;
border:none;
border-radius:20px;
padding:10px;
font-size:16px;
}

.footer button{
border:none;
width:42px;
height:42px;
border-radius:50%;
background:#25d366;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="app">

<div class="header">

<div class="avatar">O</div>

<div>
<div class="groupname">Obrolan Seo</div>
<div class="status" id="peerCount">1 peserta</div>
</div>

</div>

<div class="setup">

ID kamu
<input id="myId" readonly>

Connect ke Peer
<input id="peerId" placeholder="Masukkan peer ID">

<button id="connectBtn">Connect</button>

</div>

<div class="chat" id="chat"></div>

<div class="footer">

<input id="messageInput" placeholder="Ketik pesan">
<button id="sendBtn">➤</button>

</div>

</div>

<script>

/* USERNAME AUTO */

const names=["Anto","Budi","Sari","Rina","Dodi","Joko","Dina","Rudi","Sinta","Arif"]

function randomUser(){
return names[Math.floor(Math.random()*names.length)]
+Math.floor(1000+Math.random()*9000)
}

if(!localStorage.username){
localStorage.username=randomUser()
}

const username=localStorage.username

/* VARIABLES */

let connections=[]
let knownPeers=new Set()
let chatLog=[]
let seenMessages=new Set()

const peer=new Peer()

const chat=document.getElementById("chat")
const myId=document.getElementById("myId")
const peerId=document.getElementById("peerId")
const connectBtn=document.getElementById("connectBtn")
const sendBtn=document.getElementById("sendBtn")
const messageInput=document.getElementById("messageInput")
const peerCount=document.getElementById("peerCount")

/* RENDER CHAT */

function render(){

chat.innerHTML=""

chatLog.forEach(m=>{

const box=document.createElement("div")

box.className="msg "+(m.user===username?"me":"other")

let html=""

if(m.user!==username){
html+=`<div class="sender">${m.user}</div>`
}

html+=m.text

const time=new Date(m.time).toLocaleTimeString()

box.innerHTML=html+`<div class="time">${time}</div>`

chat.appendChild(box)

})

chat.scrollTop=chat.scrollHeight

}

/* BROADCAST */

function broadcast(data, sender=null){

connections.forEach(conn=>{
if(conn!==sender){
conn.send(data)
}
})

}

/* CONNECT PEER */

function connectPeer(pid){

if(pid===peer.id) return

if(connections.find(c=>c.peer===pid)) return

const conn=peer.connect(pid)

setup(conn)

}

/* SEND MESSAGE */

function send(){

const text=messageInput.value.trim()
if(!text) return

const msg={
id:crypto.randomUUID(),
user:username,
text,
time:Date.now()
}

seenMessages.add(msg.id)

chatLog.push(msg)

render()

broadcast({
type:"chat",
msg
})

messageInput.value=""

}

sendBtn.onclick=send

messageInput.addEventListener("keypress",e=>{
if(e.key==="Enter") send()
})

/* PEER OPEN */

peer.on("open",id=>{

myId.value=id

knownPeers.add(id)

})

/* MANUAL CONNECT */

connectBtn.onclick=()=>{
connectPeer(peerId.value)
}

/* INCOMING CONNECTION */

peer.on("connection",conn=>{
setup(conn)
})

/* SETUP CONNECTION */

function setup(conn){

connections.push(conn)

knownPeers.add(conn.peer)

peerCount.innerText=(connections.length+1)+" peserta"

conn.on("open",()=>{

/* sync chat */

conn.send({
type:"sync",
chatLog
})

/* intro peers */

conn.send({
type:"peers",
peers:[...knownPeers]
})

})

conn.on("data",data=>{

/* CHAT */

if(data.type==="chat"){

const msg=data.msg

if(seenMessages.has(msg.id)) return

seenMessages.add(msg.id)

chatLog.push(msg)

render()

broadcast(data,conn)

}

/* SYNC */

if(data.type==="sync"){

data.chatLog.forEach(msg=>{

if(!seenMessages.has(msg.id)){

seenMessages.add(msg.id)
chatLog.push(msg)

}

})

render()

}

/* PEER INTRODUCTION */

if(data.type==="peers"){

data.peers.forEach(pid=>{

if(!knownPeers.has(pid)){

knownPeers.add(pid)

connectPeer(pid)

}

})

}

})

conn.on("close",()=>{

connections=connections.filter(c=>c!==conn)

peerCount.innerText=(connections.length+1)+" peserta"

})

}

/* PERIODIC PEER SHARE */

setInterval(()=>{

broadcast({
type:"peers",
peers:[...knownPeers]
})

},4000)

</script>

</body>
</html>
