<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Hypercore Chat Full Mesh</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
body{font-family:system-ui;background:#f4f6f9;margin:0;}
header{background:#111827;color:white;padding:20px;text-align:center;}
.container{max-width:900px;margin:auto;padding:20px;}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 4px 12px rgba(0,0,0,.06);}
input,button{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:1px solid #ccc;}
button{background:#2563eb;color:white;border:none;cursor:pointer;}
#chat{background:#0f172a;color:white;padding:10px;height:300px;overflow:auto;font-family:monospace;}
</style>
</head>
<body>
<header>
<h1>P2P Group Chat Demo Full Mesh</h1>
<p>Konsep Hypercore append-only chat log</p>
</header>

<div class="container">

<div class="card">
<h3>Identitas</h3>
<input id="username" placeholder="Nama kamu">
<p>Public Key:</p>
<input id="myId" readonly>
<p>Connect ke Peer:</p>
<input id="peerId" placeholder="Masukkan Peer ID">
<button id="connectBtn">Connect</button>
</div>

<div class="card">
<h3>Chat Group</h3>
<div id="chat"></div>
<input id="messageInput" placeholder="Tulis pesan...">
<button id="sendBtn">Kirim</button>
</div>

</div>

<script>
let chatLog=[], connections=[], knownPeers=new Set();

const peer=new Peer();
const chat=document.getElementById("chat");
const username=document.getElementById("username");
const myId=document.getElementById("myId");
const peerId=document.getElementById("peerId");
const connectBtn=document.getElementById("connectBtn");
const sendBtn=document.getElementById("sendBtn");
const messageInput=document.getElementById("messageInput");

function render(){
  chat.innerText = chatLog.map(m=>`${m.user}: ${m.text}`).join("\n");
  chat.scrollTop = chat.scrollHeight;
}

function broadcast(msg,sender=null){
  connections.forEach(c=>{if(c!==sender)c.send(msg);});
}

sendBtn.onclick=()=>{
  const text=messageInput.value.trim();
  if(!text) return;
  const msg={id:crypto.randomUUID(),user:username.value||"anon",text,time:Date.now()};
  chatLog.push(msg);
  render();
  broadcast({type:"chat",msg});
  messageInput.value="";
};

peer.on("open",id=>{myId.value=id; knownPeers.add(id);});

// Connect manual
connectBtn.onclick=()=>{
  const pid=peerId.value.trim();
  if(pid && pid!==peer.id) connectPeer(pid);
};

// Incoming connection
peer.on("connection",conn=>{
  setup(conn);
});

// Connect peer
function connectPeer(pid){
  if(pid===peer.id) return;
  if(connections.find(c=>c.peer===pid)) return;
  const conn = peer.connect(pid,{reliable:true});
  setup(conn);
}

// Setup connection
function setup(conn){
  if(connections.find(c=>c.peer===conn.peer)) return;
  connections.push(conn);
  knownPeers.add(conn.peer);
  updatePeerCount();

  conn.on("open",()=>{
    // Sync chat log
    conn.send({type:"sync",chatLog});
    // Send known peers
    conn.send({type:"peers",[...knownPeers]});
  });

  conn.on("data",data=>{
    if(data.type==="chat"){
      if(chatLog.find(m=>m.id===data.msg.id)) return;
      chatLog.push(data.msg);
      render();
      broadcast(data,conn);
    }
    if(data.type==="sync"){
      data.chatLog.forEach(m=>{if(!chatLog.find(x=>x.id===m.id)) chatLog.push(m);});
      render();
    }
    if(data.type==="peers"){
      data.peers.forEach(pid=>{
        if(!knownPeers.has(pid)){
          knownPeers.add(pid);
          connectPeer(pid);
        }
      });
    }
  });

  conn.on("close",()=>{
    connections=connections.filter(c=>c!==conn);
    updatePeerCount();
  });
}

function updatePeerCount(){
  document.getElementById("peerCount")?.innerText=(connections.length+1)+" peserta";
}

// Periodic broadcast known peers
setInterval(()=>{
  broadcast({type:"peers",[...knownPeers]});
},5000);
</script>

</body>
</html>
