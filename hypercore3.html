<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini WhatsApp P2P</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>

body{
font-family:system-ui;
background:#e5ddd5;
margin:0;
}

header{
background:#075e54;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

input,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#25d366;
color:white;
border:none;
cursor:pointer;
}

#chat{
background:#efeae2;
height:320px;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.msg{
max-width:70%;
padding:8px 10px;
border-radius:10px;
font-size:14px;
}

.me{
background:#dcf8c6;
align-self:flex-end;
}

.other{
background:white;
align-self:flex-start;
}

.name{
font-size:11px;
opacity:.6;
}

#peers{
font-size:13px;
}

</style>
</head>

<body>

<header>
<h2>Mini WhatsApp P2P</h2>
<p>Chat langsung antar browser</p>
</header>

<div class="container">

<div class="card">

<b>Identitas</b>

<input id="username">

<p>ID kamu:</p>
<input id="myId" readonly>

<p>Connect ke Peer:</p>
<input id="peerId" placeholder="Masukkan Peer ID">

<button id="connectBtn">Connect</button>

<p>Peer Online:</p>
<div id="peers">0</div>

</div>


<div class="card">

<div id="chat"></div>

<input id="messageInput" placeholder="Ketik pesan...">

<button id="sendBtn">Kirim</button>

</div>

</div>


<script>

/* ========= USERNAME OTOMATIS ========= */

const names=[
"Anto","Budi","Sari","Rina","Dodi",
"Joko","Dina","Rudi","Sinta","Arif",
"Putri","Agus","Fajar","Tono","Lina"
]

function randomUsername(){

const name = names[Math.floor(Math.random()*names.length)]
const number = Math.floor(1000 + Math.random()*9000)

return name + number

}

if(!localStorage.username){
localStorage.username=randomUsername()
}

const usernameInput=document.getElementById("username")
usernameInput.value=localStorage.username

usernameInput.onchange=()=>{
localStorage.username=usernameInput.value
}


/* ========= VARIABEL ========= */

let chatLog=[]
let connections=[]

const peer=new Peer()

const chat=document.getElementById("chat")
const myId=document.getElementById("myId")
const peerId=document.getElementById("peerId")
const connectBtn=document.getElementById("connectBtn")
const sendBtn=document.getElementById("sendBtn")
const messageInput=document.getElementById("messageInput")
const peers=document.getElementById("peers")


/* ========= RENDER CHAT ========= */

function render(){

chat.innerHTML=""

chatLog.forEach(m=>{

const div=document.createElement("div")

div.className="msg "+(m.user===usernameInput.value?"me":"other")

div.innerHTML=`<div class="name">${m.user}</div>${m.text}`

chat.appendChild(div)

})

chat.scrollTop=chat.scrollHeight

}


/* ========= BROADCAST ========= */

function broadcast(data){
connections.forEach(c=>c.send(data))
}


/* ========= SEND MESSAGE ========= */

function sendMessage(){

const text=messageInput.value.trim()
if(!text) return

const msg={
user:usernameInput.value,
text,
time:Date.now()
}

chatLog.push(msg)

render()

broadcast({
type:"chat",
msg
})

messageInput.value=""

}

sendBtn.onclick=sendMessage

messageInput.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage()
})


/* ========= PEER OPEN ========= */

peer.on("open",id=>{
myId.value=id
})


/* ========= CONNECT ========= */

connectBtn.onclick=()=>{

const conn=peer.connect(peerId.value)

setup(conn)

}


/* ========= INCOMING ========= */

peer.on("connection",conn=>{
setup(conn)
})


/* ========= SETUP CONNECTION ========= */

function setup(conn){

connections.push(conn)

peers.innerText=connections.length

conn.on("open",()=>{

conn.send({
type:"sync",
chatLog
})

})

conn.on("data",data=>{

if(data.type==="chat"){

chatLog.push(data.msg)
render()

}

if(data.type==="sync"){

chatLog=data.chatLog
render()

}

})

conn.on("close",()=>{
connections=connections.filter(c=>c!==conn)
peers.innerText=connections.length
})

}

</script>

</body>
</html>
