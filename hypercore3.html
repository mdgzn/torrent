<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P WhatsApp Style Chat</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#111b21;
color:white;
display:flex;
justify-content:center;
height:100vh;
}

.app{
width:100%;
max-width:420px;
display:flex;
flex-direction:column;
background:#0b141a;
}

.header{
background:#202c33;
padding:12px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#25d366;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.name{
font-size:15px;
}

.status{
font-size:12px;
opacity:.7;
}

.chat{
flex:1;
overflow:auto;
padding:10px;
background:#0b141a;
display:flex;
flex-direction:column;
gap:6px;
}

.msg{
max-width:75%;
padding:7px 10px;
border-radius:8px;
font-size:14px;
position:relative;
}

.me{
background:#005c4b;
align-self:flex-end;
}

.other{
background:#202c33;
align-self:flex-start;
}

.time{
font-size:10px;
opacity:.6;
margin-top:2px;
text-align:right;
}

.footer{
background:#202c33;
padding:8px;
display:flex;
gap:6px;
}

.footer input{
flex:1;
border:none;
padding:10px;
border-radius:20px;
outline:none;
}

.footer button{
background:#25d366;
border:none;
padding:10px 16px;
border-radius:20px;
cursor:pointer;
}

.setup{
padding:10px;
background:#111b21;
}

.setup input{
width:100%;
margin-top:5px;
padding:8px;
border-radius:6px;
border:none;
}

.setup button{
margin-top:6px;
padding:8px;
border:none;
border-radius:6px;
background:#25d366;
cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="avatar" id="avatar">U</div>
<div>
<div class="name" id="usernameLabel"></div>
<div class="status" id="status">offline</div>
</div>
</div>

<div class="setup">

Peer ID kamu:
<input id="myId" readonly>

Connect ke Peer:
<input id="peerId" placeholder="Masukkan Peer ID">

<button id="connectBtn">Connect</button>

</div>

<div class="chat" id="chat"></div>

<div class="footer">
<input id="messageInput" placeholder="Ketik pesan">
<button id="sendBtn">➤</button>
</div>

</div>

<script>

/* ===== USERNAME OTOMATIS ===== */

const names=["Anto","Budi","Sari","Rina","Dodi","Joko","Dina","Rudi","Sinta","Arif"]

function randomUser(){
return names[Math.floor(Math.random()*names.length)]
+Math.floor(1000+Math.random()*9000)
}

if(!localStorage.username){
localStorage.username=randomUser()
}

const username=localStorage.username

document.getElementById("usernameLabel").innerText=username
document.getElementById("avatar").innerText=username[0]

/* ===== VAR ===== */

let connections=[]
let chatLog=[]

const peer=new Peer()

const chat=document.getElementById("chat")
const myId=document.getElementById("myId")
const peerId=document.getElementById("peerId")
const connectBtn=document.getElementById("connectBtn")
const sendBtn=document.getElementById("sendBtn")
const messageInput=document.getElementById("messageInput")
const status=document.getElementById("status")

/* ===== RENDER ===== */

function render(){

chat.innerHTML=""

chatLog.forEach(m=>{

const box=document.createElement("div")
box.className="msg "+(m.user===username?"me":"other")

const time=new Date(m.time).toLocaleTimeString()

box.innerHTML=`
${m.text}
<div class="time">${time}</div>
`

chat.appendChild(box)

})

chat.scrollTop=chat.scrollHeight

}

/* ===== BROADCAST ===== */

function broadcast(data){
connections.forEach(c=>c.send(data))
}

/* ===== SEND ===== */

function send(){

const text=messageInput.value.trim()
if(!text) return

const msg={
user:username,
text,
time:Date.now()
}

chatLog.push(msg)

render()

broadcast({type:"chat",msg})

messageInput.value=""

}

sendBtn.onclick=send

messageInput.addEventListener("keypress",e=>{
if(e.key==="Enter") send()
})

/* ===== PEER ===== */

peer.on("open",id=>{
myId.value=id
status.innerText="online"
})

connectBtn.onclick=()=>{

const conn=peer.connect(peerId.value)

setup(conn)

}

peer.on("connection",conn=>{
setup(conn)
})

function setup(conn){

connections.push(conn)

conn.on("open",()=>{

conn.send({
type:"sync",
chatLog
})

})

conn.on("data",data=>{

if(data.type==="chat"){
chatLog.push(data.msg)
render()
}

if(data.type==="sync"){
chatLog=data.chatLog
render()
}

})

}

</script>

</body>
</html>
