<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">

<title>P2P Mobile Chat</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui;
background:#111b21;
height:100vh;
overflow:hidden;
}

.app{
display:flex;
flex-direction:column;
height:100vh;
max-width:500px;
margin:auto;
background:#0b141a;
color:white;
}

/* HEADER */

.header{
background:#202c33;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:#25d366;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.username{
font-size:15px;
}

.status{
font-size:12px;
opacity:.7;
}

/* SETUP */

.setup{
padding:8px;
background:#111b21;
font-size:12px;
}

.setup input{
width:100%;
padding:8px;
margin-top:5px;
border:none;
border-radius:6px;
}

.setup button{
margin-top:5px;
padding:8px;
border:none;
border-radius:6px;
background:#25d366;
color:white;
}

/* CHAT */

.chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.msg{
max-width:80%;
padding:8px 10px;
border-radius:8px;
font-size:14px;
word-break:break-word;
}

.me{
background:#005c4b;
align-self:flex-end;
}

.other{
background:#202c33;
align-self:flex-start;
}

.time{
font-size:10px;
opacity:.6;
text-align:right;
margin-top:2px;
}

/* FOOTER */

.footer{
display:flex;
gap:6px;
padding:8px;
background:#202c33;
}

.footer input{
flex:1;
border:none;
border-radius:20px;
padding:10px;
font-size:16px;
}

.footer button{
border:none;
width:42px;
height:42px;
border-radius:50%;
background:#25d366;
color:white;
font-size:16px;
cursor:pointer;
}

/* IMAGE */

img.chatimg{
max-width:200px;
border-radius:6px;
margin-top:4px;
}

</style>

</head>

<body>

<div class="app">

<div class="header">

<div class="avatar" id="avatar">U</div>

<div>
<div class="username" id="usernameLabel"></div>
<div class="status" id="status">offline</div>
</div>

</div>

<div class="setup">

ID kamu
<input id="myId" readonly>

Connect ke Peer
<input id="peerId" placeholder="Masukkan peer ID">

<button id="connectBtn">Connect</button>

<div id="peerCount">Peer: 0</div>

</div>

<div class="chat" id="chat"></div>

<div class="footer">

<input id="messageInput" placeholder="Ketik pesan">

<input type="file" id="fileInput" style="display:none">

<button id="fileBtn">📎</button>

<button id="sendBtn">➤</button>

</div>

</div>

<script>

/* USERNAME */

const names=["Anto","Budi","Sari","Rina","Dodi","Joko","Dina","Rudi","Sinta","Arif"]

function randomUser(){
return names[Math.floor(Math.random()*names.length)]
+Math.floor(1000+Math.random()*9000)
}

if(!localStorage.username){
localStorage.username=randomUser()
}

const username=localStorage.username

document.getElementById("usernameLabel").innerText=username
document.getElementById("avatar").innerText=username[0]

/* VAR */

let connections=[]
let chatLog=[]

const peer=new Peer()

const chat=document.getElementById("chat")
const myId=document.getElementById("myId")
const peerId=document.getElementById("peerId")
const connectBtn=document.getElementById("connectBtn")
const sendBtn=document.getElementById("sendBtn")
const messageInput=document.getElementById("messageInput")
const status=document.getElementById("status")
const fileBtn=document.getElementById("fileBtn")
const fileInput=document.getElementById("fileInput")
const peerCount=document.getElementById("peerCount")

/* RENDER */

function render(){

chat.innerHTML=""

chatLog.forEach(m=>{

const box=document.createElement("div")

box.className="msg "+(m.user===username?"me":"other")

let html=""

if(m.type==="text"){
html=m.text
}

if(m.type==="image"){
html=`<img class="chatimg" src="${m.data}">`
}

if(m.type==="file"){
html=`<a href="${m.data}" download="${m.name}">📎 ${m.name}</a>`
}

const time=new Date(m.time).toLocaleTimeString()

box.innerHTML=html+`<div class="time">${time}</div>`

chat.appendChild(box)

})

chat.scrollTop=chat.scrollHeight

}

/* BROADCAST */

function broadcast(data){
connections.forEach(c=>c.send(data))
}

/* SEND TEXT */

function send(){

const text=messageInput.value.trim()
if(!text) return

const msg={
type:"text",
user:username,
text,
time:Date.now()
}

chatLog.push(msg)

render()

broadcast({type:"chat",msg})

messageInput.value=""

}

sendBtn.onclick=send

messageInput.addEventListener("keypress",e=>{
if(e.key==="Enter") send()
})

/* FILE */

fileBtn.onclick=()=>fileInput.click()

fileInput.onchange=()=>{

const file=fileInput.files[0]

const reader=new FileReader()

reader.onload=()=>{

let msg

if(file.type.startsWith("image")){
msg={
type:"image",
user:username,
data:reader.result,
time:Date.now()
}
}else{
msg={
type:"file",
user:username,
data:reader.result,
name:file.name,
time:Date.now()
}
}

chatLog.push(msg)

render()

broadcast({type:"chat",msg})

}

reader.readAsDataURL(file)

}

/* PEER */

peer.on("open",id=>{
myId.value=id
status.innerText="online"
})

connectBtn.onclick=()=>{
const conn=peer.connect(peerId.value)
setup(conn)
}

peer.on("connection",conn=>{
setup(conn)
})

function setup(conn){

connections.push(conn)

peerCount.innerText="Peer: "+connections.length

conn.on("open",()=>{
conn.send({type:"sync",chatLog})
})

conn.on("data",data=>{

if(data.type==="chat"){
chatLog.push(data.msg)
render()
}

if(data.type==="sync"){
chatLog=data.chatLog
render()
}

})

conn.on("close",()=>{
connections=connections.filter(c=>c!==conn)
peerCount.innerText="Peer: "+connections.length
})

}

</script>

</body>
</html>
