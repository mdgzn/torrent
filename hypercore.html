```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Mini Hypercore P2P Learning Demo</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>
body{
font-family:system-ui;
background:#f4f6f9;
margin:0;
}

header{
background:#111827;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 4px 12px rgba(0,0,0,.06);
}

button,input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#log{
background:#0f172a;
color:#22c55e;
padding:12px;
height:200px;
overflow:auto;
font-family:monospace;
}

.peer{
font-size:14px;
color:#666;
}
</style>
</head>

<body>

<header>
<h1>Mini Hypercore P2P Demo</h1>
<p>Append-only log dengan replication antar peer</p>
</header>

<div class="container">

<div class="card">
<h2>🔑 Feed Identity</h2>

<p class="peer">Public Key (Feed ID):</p>
<input id="myId" readonly>

<p class="peer">Connect ke Peer:</p>
<input id="peerId" placeholder="Masukkan public key peer">

<button id="connectBtn">Connect Peer</button>

</div>

<div class="card">

<h2>➕ Append Data</h2>

<input id="dataInput" placeholder="Tulis data baru">

<button id="appendBtn">Append ke Feed</button>

</div>

<div class="card">

<h2>📜 Feed Log (Append Only)</h2>

<div id="log"></div>

</div>

</div>

<script>

let feed = []
let connections = []

const peer = new Peer()

const myId = document.getElementById("myId")
const peerId = document.getElementById("peerId")
const connectBtn = document.getElementById("connectBtn")
const appendBtn = document.getElementById("appendBtn")
const dataInput = document.getElementById("dataInput")
const logBox = document.getElementById("log")

/* ===== Render Feed ===== */

function render(){

logBox.innerText = feed
.map((v,i)=>`#${i}  ${v}`)
.join("\n")

}

/* ===== Append Entry ===== */

appendBtn.onclick = ()=>{

const data = dataInput.value.trim()

if(!data) return

feed.push(data)

render()

broadcast({
type:"append",
data
})

dataInput.value=""

}

/* ===== Broadcast ===== */

function broadcast(msg){

connections.forEach(conn=>{
conn.send(msg)
})

}

/* ===== Peer Ready ===== */

peer.on("open", id=>{
myId.value = id
})

/* ===== Connect Peer ===== */

connectBtn.onclick = ()=>{

const conn = peer.connect(peerId.value)

setupConnection(conn)

}

/* ===== Incoming Peer ===== */

peer.on("connection", conn=>{
setupConnection(conn)
})

/* ===== Setup Connection ===== */

function setupConnection(conn){

connections.push(conn)

conn.on("open", ()=>{

/* sync full feed */

conn.send({
type:"sync",
feed
})

})

conn.on("data", msg=>{

if(msg.type==="append"){

feed.push(msg.data)

render()

}

if(msg.type==="sync"){

feed = msg.feed

render()

}

})

}

</script>

</body>
</html>
